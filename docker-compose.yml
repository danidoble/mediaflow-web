services:
  web:
    image: danidoble/mediaflow-web:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-}
        - PUBLIC_APP_NAME=${PUBLIC_APP_NAME:-MediaFlow}
    ports:
      - "${PUBLIC_APP_PORT:-4321}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
